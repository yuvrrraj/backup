<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password - GENZES CHATS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-container { min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:1rem; }
    .auth-card { background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:2rem;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2); }
    .auth-header { text-align:center;margin-bottom:2rem; }
    .auth-header h1 { color:white;font-size:2rem;font-weight:700;margin:0 0 0.5rem 0; }
    .auth-header p { color:rgba(255,255,255,0.8);margin:0; }
    .form-group { margin-bottom:1.5rem; }
    .form-group label { display:block;color:white;font-weight:500;margin-bottom:0.5rem; }
    .form-group input { width:100%;padding:0.75rem;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(255,255,255,0.1);color:white;font-size:1rem;box-sizing:border-box; }
    .form-group input::placeholder { color:rgba(255,255,255,0.6); }
    .form-group input:focus { outline:none;border-color:white;background:rgba(255,255,255,0.2); }
    .password-field { position:relative; }
    .password-toggle { position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:1.2rem; }
    .submit-btn { width:100%;padding:0.75rem;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;border-radius:8px;color:white;font-size:1rem;font-weight:600;cursor:pointer;margin-top:0.5rem; }
    .submit-btn:disabled { opacity:0.6;cursor:not-allowed; }
    .error-message { background:rgba(255,0,0,0.2);border:1px solid rgba(255,0,0,0.5);color:#ff6b6b;padding:0.75rem;border-radius:8px;margin-bottom:1rem;text-align:center;display:none; }
    .success-message { background:rgba(0,255,0,0.2);border:1px solid rgba(0,255,0,0.5);color:#51cf66;padding:0.75rem;border-radius:8px;margin-bottom:1rem;text-align:center;display:none; }
    .loading { display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>GENZES CHATS</h1>
        <p>Set your new password</p>
      </div>
      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="password-field">
          <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)">
          <button type="button" class="password-toggle" onclick="togglePass('newPassword', this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-field">
          <input type="password" id="confirmPassword" placeholder="Confirm new password">
          <button type="button" class="password-toggle" onclick="togglePass('confirmPassword', this)">👁</button>
        </div>
      </div>
      <button class="submit-btn" id="updateBtn" onclick="updatePass()">
        <span id="updateBtnText">Update Password</span>
        <span id="updateBtnLoader" class="loading" style="display:none;"></span>
      </button>
    </div>
  </div>

  <script src="js/supabaseClient.js"></script>
  <script>
    // Supabase handles the token from the URL hash automatically on page load
    window.sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // User is now in password recovery mode — ready to update
        console.log('Password recovery session active');
      }
    });

    async function updatePass() {
      const newPass = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;

      if (!newPass) { showError('Please enter a new password'); return; }
      if (newPass.length < 6) { showError('Password must be at least 6 characters'); return; }
      if (newPass !== confirmPass) { showError('Passwords do not match'); return; }

      const btn = document.getElementById('updateBtn');
      document.getElementById('updateBtnText').style.display = 'none';
      document.getElementById('updateBtnLoader').style.display = 'inline-block';
      btn.disabled = true;

      const { error } = await window.sb.auth.updateUser({ password: newPass });

      document.getElementById('updateBtnText').style.display = 'inline';
      document.getElementById('updateBtnLoader').style.display = 'none';
      btn.disabled = false;

      if (error) { showError(error.message); return; }

      showSuccess('Password updated! Redirecting to login...');
      setTimeout(() => window.location.href = 'auth.html', 2000);
    }

    function togglePass(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function showError(msg) {
      document.getElementById('successMessage').style.display = 'none';
      const el = document.getElementById('errorMessage');
      el.textContent = msg; el.style.display = 'block';
    }
    function showSuccess(msg) {
      document.getElementById('errorMessage').style.display = 'none';
      const el = document.getElementById('successMessage');
      el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
